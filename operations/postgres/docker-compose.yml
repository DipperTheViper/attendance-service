version: '3.8'
services:
  postgres:
    container_name: postgres
    image: ghcr.io/fboulnois/pg_uuidv7:1.6.0
    restart: always
    env_file:
     - variables.env
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/data/postgres
      - postgres-logs:/var/log/postgresql/
    networks:
      - nginx_net
networks:
  nginx_net:
    external: true
volumes:
  postgres-data:
  postgres-logs:

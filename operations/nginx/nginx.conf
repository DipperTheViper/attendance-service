pid        logs/nginx.pid;
error_log  logs/error.log debug;
events {
        worker_connections  4096;  ## Default: 1024
}
http {
        log_format compression '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" "$gzip_ratio" "$http_upgrade" "$host" "$proxy_add_x_forwarded_for"';
        access_log logs/access.log compression ;
        client_max_body_size 100M;


        server {
                listen 443 ssl;
                listen [::]:443 ssl;
                server_name api-yoop.fazelidev.ir;
                index index.html;
                root /var/www/html;
                ssl_certificate /etc/nginx/server.crt;
                ssl_certificate_key /etc/nginx/server.key;
                ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
                ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;


                location / {
                               proxy_pass http://backend:8100;
                               proxy_set_header Host $http_host;
                               proxy_set_header X-Real-IP $remote_addr;
                               proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                               proxy_set_header X-Forwarded-Proto $scheme;
                               proxy_connect_timeout       500;
                               proxy_send_timeout          600;
                               proxy_read_timeout          500;
                               send_timeout                600;
                           }
                location /media {
                                proxy_pass http://yoop-object-storage-nginx/media;
                                proxy_set_header X-Real-IP $remote_addr;
                                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                                proxy_set_header Host $http_host;
                                proxy_set_header X-NginX-Proxy true;
                                proxy_http_version 1.1;
                                proxy_set_header Upgrade $http_upgrade;
                                proxy_set_header Connection "upgrade";
                                proxy_cache_bypass $http_upgrade;
                                proxy_pass_request_headers on;
                        }
        }




}
